<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Remoto Boomerang</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; background: #111; color: #fff; text-align: center; padding: 20px; }
        button { font-size: 24px; padding: 15px 30px; margin: 10px; border-radius: 10px; border: none; background: #2980b9; color: #fff; }
        button:active { background: #3498db; }
        .row { display: flex; justify-content: center; gap: 10px; }
        .special { background: #8e44ad; }
    </style>
</head>
<body>
    <h2>Control Remoto – Boomerang Vision</h2>
    <div class="row"><button onclick="enviar('ArrowUp')">▲</button></div>
    <div class="row">
        <button onclick="enviar('ArrowLeft')">◀</button>
        <button onclick="enviar('ArrowRight')">▶</button>
    </div>
    <div class="row"><button onclick="enviar('ArrowDown')">▼</button></div>
    <br>
    <button onclick="enviar('KeyR')">🔦 Resaltar</button>
    <button onclick="enviar('KeyU')">👤 Individual</button>
    <button onclick="enviar('KeyB')">🎨 Bicrom.</button>

    <script>
        const socket = io();
        function enviar(cmd) { socket.emit('comando', cmd); }
    </script>
</body>
</html>
