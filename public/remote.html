<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Control Remoto Boomerang</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #111;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px;
            user-select: none;
            -webkit-user-select: none;
            overflow: hidden;
        }

        /* Contenedor del remoto: sin scroll, altura ajustable pero fija */
        #remote-screen {
            width: 100%;
            max-width: 500px;
            height: auto;
            min-height: 260px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: #000;
            border-radius: 12px;
            margin-bottom: 12px;
            padding: 10px 6px;
            overflow: hidden;
        }
        #remote-screen img { filter: invert(1); }

        .remote-line {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            gap: 8px;
        }
        .remote-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .remote-row img {
            display: block;
            flex-shrink: 0;
        }
        .remote-text {
            font-family: 'Arial Black', Impact, sans-serif;
            font-weight: normal;
            color: #fff;
            line-height: 1;
            display: block;
            font-size: 28px;  /* Tamaño fijo para letras/números */
        }
        .remote-line.dimmed .remote-text,
        .remote-line.dimmed img { opacity: 0.10; }

        /* Anotaciones: siempre visibles, ancho fijo */
        .remote-ann-left, .remote-ann-right {
            font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
            font-weight: 600;
            width: 50px;
            text-align: center;
            font-size: 14px;
            color: #aaa;
            flex-shrink: 0;
        }

        /* Botones (modo, direccional, función) - mismos estilos compactos */
        .mode-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            width: 100%;
            max-width: 400px;
            margin-bottom: 8px;
        }
        .mode-grid button {
            font-size: 13px;
            font-weight: 700;
            padding: 8px 0;
            border: none;
            border-radius: 8px;
            background: #333;
            color: #fff;
        }
        .mode-grid button.active-mode { background: #2980b9; }

        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 5px;
            width: 60vmin;
            height: 60vmin;
            max-width: 220px;
            max-height: 220px;
            margin-bottom: 8px;
        }
        .dpad button {
            font-size: 28px;
            border: none;
            border-radius: 8px;
            background: #2980b9;
            color: #fff;
        }
        .dpad button:active { background: #3498db; transform: scale(0.92); }
        .dpad .empty { background: transparent; pointer-events: none; }

        .function-btns {
            display: flex;
            width: 100%;
            max-width: 400px;
            gap: 5px;
        }
        .function-btns button {
            flex: 1;
            font-size: 12px;
            font-weight: 700;
            padding: 10px 0;
            border: 2px solid transparent;
            border-radius: 8px;
            background: #444;
            color: #fff;
        }
        .function-btns button.active-func { border-color: #f1c40f; }
        .function-btns button.special {
            background: linear-gradient(to right, #e74c3c 50%, #2ecc71 50%);
            color: #fff;
        }
    </style>
</head>
<body>
    <div id="remote-screen"></div>

    <div class="mode-grid" id="mode-buttons">
        <button data-mode="letters" class="active-mode">Letras</button>
        <button data-mode="numbers">Números</button>
        <button data-mode="pediatric">Figuras</button>
        <button data-mode="e_directional">E direc.</button>
    </div>

    <div class="dpad">
        <div class="empty"></div><button onclick="enviar('ArrowUp')">▲</button><div class="empty"></div>
        <button onclick="enviar('ArrowLeft')">◀</button><div class="empty"></div><button onclick="enviar('ArrowRight')">▶</button>
        <div class="empty"></div><button onclick="enviar('ArrowDown')">▼</button><div class="empty"></div>
    </div>

    <div class="function-btns" id="func-buttons">
        <button id="btn-resaltar" onclick="enviar('KeyR')">🔦 Resaltar</button>
        <button id="btn-individual" onclick="enviar('KeyU')">👤 Individual</button>
        <button id="btn-bic" class="special" onclick="enviar('KeyB')"></button>
    </div>

    <script>
        const socket = io();
        function enviar(cmd) {
            socket.emit('comando', cmd);
            if (window.navigator?.vibrate) window.navigator.vibrate(15);
        }

        document.querySelectorAll('#mode-buttons button').forEach(btn => {
            btn.addEventListener('click', () => enviar('Mode:' + btn.dataset.mode));
        });

        socket.on('modo', (modo) => {
            document.querySelectorAll('#mode-buttons button').forEach(btn => {
                btn.classList.toggle('active-mode', btn.dataset.mode === modo);
            });
        });

        function updateFuncButtons(state) {
            document.getElementById('btn-resaltar')?.classList.toggle('active-func', state.highlightMode);
            document.getElementById('btn-individual')?.classList.toggle('active-func', state.singleCharMode);
            document.getElementById('btn-bic')?.classList.toggle('active-func', state.bichromatic);
        }

        // Tamaños fijos para el remoto (no se escala según la línea)
        const BASE_FONT_SIZE = 28;      // px para letras/números
        const SCALE_E = 0.739;          // para E direccional
        const SCALE_FIG = 0.769;        // para figuras infantiles

        socket.on('screenUpdate', (data) => {
            const container = document.getElementById('remote-screen');
            container.innerHTML = '';
            if (!data?.lines) return;

            // Espaciado fijo para todas las líneas
            const gap = 10;
            container.style.gap = gap + 'px';

            data.lines.forEach((line, li) => {
                const lineDiv = document.createElement('div');
                lineDiv.className = 'remote-line';
                lineDiv.style.gap = gap + 'px';

                // Resaltado si aplica
                if (data.highlightMode && li !== data.highlightLineIdx) {
                    lineDiv.classList.add('dimmed');
                }

                // Anotación izquierda (Snellen: solo denominador)
                const leftAnn = document.createElement('div');
                leftAnn.className = 'remote-ann-left';
                const denominator = line.snellen.split('/')[1];
                leftAnn.textContent = denominator;

                // Fila de optotipos
                const row = document.createElement('div');
                row.className = 'remote-row';
                row.style.gap = gap + 'px';

                let chars = line.chars;
                if (data.singleCharMode) chars = [chars[0]];

                chars.forEach(ch => {
                    if (ch.type === 'text') {
                        const span = document.createElement('span');
                        span.className = 'remote-text';
                        span.textContent = ch.char;
                        // Tamaño fijo, no depende de la línea
                        span.style.fontSize = BASE_FONT_SIZE + 'px';
                        row.appendChild(span);
                    } else {
                        const img = document.createElement('img');
                        // Escalas fijas aplicadas al tamaño base
                        let scale = ch.key === 'E_0' ? SCALE_E : SCALE_FIG;
                        const size = BASE_FONT_SIZE * scale;
                        img.style.height = size + 'px';
                        img.style.width = size + 'px';
                        img.style.display = 'block';
                        if (ch.rot) img.style.transform = `rotate(${ch.rot}deg)`;
                        img.src = ch.uri || '';
                        row.appendChild(img);
                    }
                });

                // Anotación derecha (decimal)
                const rightAnn = document.createElement('div');
                rightAnn.className = 'remote-ann-right';
                rightAnn.textContent = line.decimal.toFixed(2);

                lineDiv.appendChild(leftAnn);
                lineDiv.appendChild(row);
                lineDiv.appendChild(rightAnn);
                container.appendChild(lineDiv);
            });

            updateFuncButtons(data);
        });

        socket.on('connect', () => socket.emit('requestScreenUpdate'));
    </script>
</body>
</html>
