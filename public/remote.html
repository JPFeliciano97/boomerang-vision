<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Control Remoto Boomerang</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg: #111;
            --text: #fff;
            --btn: #2980b9;
            --btn-active: #3498db;
            --special: #8e44ad;
            --dim: #444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #111;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 6px;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Zona de optotipos (tamaño fijo) */
        #remote-screen {
            width: 100%;
            height: 130px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            background: #000;
            border-radius: 10px;
            margin-bottom: 6px;
            overflow: hidden;
        }
        .remote-line {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            gap: 4px;
        }
        .remote-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        .remote-row img {
            display: block;
            flex-shrink: 0;
            transform-origin: center center;
        }
        .remote-text {
            font-family: 'Arial Black', Impact, sans-serif;
            font-weight: normal;
            color: #fff;
            line-height: 1;
            display: block;
        }
        .remote-line.dimmed .remote-text,
        .remote-line.dimmed img { opacity: 0.10; }

        .remote-ann-left, .remote-ann-right {
            font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
            font-weight: 600;
            width: 55px;
            text-align: center;
            font-size: 13px;
            color: #aaa;
        }

        /* Botones de modo */
        .mode-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            width: 100%;
            max-width: 400px;
            margin-bottom: 5px;
        }
        .mode-grid button {
            font-size: 13px;
            font-weight: 700;
            padding: 10px 0;
            border: none;
            border-radius: 8px;
            background: #333;
            color: #fff;
        }
        .mode-grid button.active-mode { background: #2980b9; }

        /* Cruz direccional */
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 5px;
            width: 55vmin;
            height: 55vmin;
            max-width: 220px;
            max-height: 220px;
            margin-bottom: 5px;
        }
        .dpad button {
            font-size: 26px;
            border: none;
            border-radius: 8px;
            background: #2980b9;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .dpad button:active { background: #3498db; transform: scale(0.92); }
        .dpad .empty { background: transparent; pointer-events: none; }

        /* Botones de función */
        .function-btns {
            display: flex;
            width: 100%;
            max-width: 400px;
            gap: 5px;
        }
        .function-btns button {
            flex: 1;
            font-size: 13px;
            font-weight: 700;
            padding: 10px 0;
            border: 2px solid transparent;
            border-radius: 8px;
            background: #444;
            color: #fff;
            transition: border-color 0.2s;
        }
        .function-btns button.active-func { border-color: #f1c40f; }
        .function-btns button.special {
            background: linear-gradient(to right, #e74c3c 50%, #2ecc71 50%);
            color: #fff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div id="remote-screen"></div>

    <div class="mode-grid" id="mode-buttons">
        <button data-mode="letters" class="active-mode">Letras</button>
        <button data-mode="numbers">Números</button>
        <button data-mode="pediatric">Figuras</button>
        <button data-mode="e_directional">E direc.</button>
    </div>

    <div class="dpad">
        <div class="empty"></div><button onclick="enviar('ArrowUp')">▲</button><div class="empty"></div>
        <button onclick="enviar('ArrowLeft')">◀</button><div class="empty"></div><button onclick="enviar('ArrowRight')">▶</button>
        <div class="empty"></div><button onclick="enviar('ArrowDown')">▼</button><div class="empty"></div>
    </div>

    <div class="function-btns" id="func-buttons">
        <button id="btn-resaltar" onclick="enviar('KeyR')">🔦 Resaltar</button>
        <button id="btn-individual" onclick="enviar('KeyU')">👤 Individual</button>
        <button id="btn-bic" class="special" onclick="enviar('KeyB')"></button>
    </div>

    <script>
        const socket = io();

        function enviar(cmd) {
            socket.emit('comando', cmd);
            if (window.navigator?.vibrate) window.navigator.vibrate(15);
        }

        document.querySelectorAll('#mode-buttons button').forEach(btn => {
            btn.addEventListener('click', () => enviar('Mode:' + btn.dataset.mode));
        });

        socket.on('modo', (modo) => {
            document.querySelectorAll('#mode-buttons button').forEach(btn => {
                btn.classList.toggle('active-mode', btn.dataset.mode === modo);
            });
        });

        function updateFuncButtons(state) {
            document.getElementById('btn-resaltar')?.classList.toggle('active-func', state.highlightMode);
            document.getElementById('btn-individual')?.classList.toggle('active-func', state.singleCharMode);
            document.getElementById('btn-bic')?.classList.toggle('active-func', state.bichromatic);
        }

        socket.on('screenUpdate', (data) => {
            const container = document.getElementById('remote-screen');
            container.innerHTML = '';
            if (!data?.lines || !data.cal) return;

            const cal = data.cal;
            const pxPerMM = cal.pxPerMM;
            function cssHeight(h_mm) {
                return (h_mm * pxPerMM) / cal.dprManual * cal.calibrationScale;
            }
            const rad = (min) => min * Math.PI / 10800;
            function optotypeHeightMM(decimal) {
                const angleMin = 5 / decimal;
                return 2 * cal.testDistanceM * 1000 * Math.tan(rad(angleMin / 2));
            }

            const firstDecimal = data.lines[0]?.decimal || 1.0;
            const baseH_mm = optotypeHeightMM(firstDecimal);
            let baseSpacing = cssHeight(baseH_mm) * 0.5;
            if (data.lines.length > 1) baseSpacing *= 1.15;
            const responsiveGap = `clamp(3px, 1vw, ${baseSpacing}px)`;
            container.style.gap = responsiveGap;

            // Índice de línea resaltada (global -> local)
            const currentScreen = data.lines;
            const highlightLineIdx = data.highlightMode ? data.highlightLineIdx : -1;

            currentScreen.forEach((line, li) => {
                const h_mm = optotypeHeightMM(line.decimal);
                const h_css = cssHeight(h_mm); // sin límite

                const lineDiv = document.createElement('div');
                lineDiv.className = 'remote-line';
                lineDiv.style.gap = responsiveGap;

                if (data.highlightMode && li !== highlightLineIdx) {
                    lineDiv.classList.add('dimmed');
                }

                const leftAnn = document.createElement('div');
                leftAnn.className = 'remote-ann-left';
                leftAnn.textContent = line.snellen;

                const row = document.createElement('div');
                row.className = 'remote-row';
                row.style.gap = responsiveGap;

                let chars = line.chars;
                if (data.singleCharMode) chars = [chars[0]];

                chars.forEach(ch => {
                    if (ch.type === 'text') {
                        const span = document.createElement('span');
                        span.className = 'remote-text';
                        span.textContent = ch.char;
                        span.style.fontSize = h_css + 'px';
                        row.appendChild(span);
                    } else {
                        const img = document.createElement('img');
                        const scaleE = 0.739, scaleFig = 0.769;
                        const scale = ch.key === 'E_0' ? scaleE : scaleFig;
                        const size = h_css * scale;
                        img.style.height = size + 'px';
                        img.style.width  = size + 'px';
                        img.style.display = 'block';
                        img.style.transformOrigin = 'center center';
                        if (ch.rot) img.style.transform = `rotate(${ch.rot}deg)`;
                        img.src = ch.uri || '';
                        row.appendChild(img);
                    }
                });

                const rightAnn = document.createElement('div');
                rightAnn.className = 'remote-ann-right';
                rightAnn.textContent = line.decimal.toFixed(2);

                lineDiv.appendChild(leftAnn);
                lineDiv.appendChild(row);
                lineDiv.appendChild(rightAnn);
                container.appendChild(lineDiv);
            });

            updateFuncButtons(data);
        });

        socket.on('connect', () => socket.emit('requestScreenUpdate'));
    </script>
</body>
</html>
