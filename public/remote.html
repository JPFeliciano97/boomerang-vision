<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Control Remoto Boomerang</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg: #111;
            --text: #fff;
            --btn: #2980b9;
            --btn-hover: #3498db;
            --special: #8e44ad;
            --dim: #444;
        }
        .light-mode {
            --bg: #f5f5f5;
            --text: #222;
            --btn: #2980b9;
            --btn-hover: #3498db;
            --special: #8e44ad;
            --dim: #ccc;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            align-items: center;
            padding: 10px;
            transition: background 0.3s, color 0.3s;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ── Modo (Letras, Números, Figuras, E direc.) ── */
        .mode-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 400px;
            padding: 0 5px;
        }
        .mode-grid button {
            font-size: clamp(14px, 3.5vw, 20px);
            font-weight: 700;
            padding: 15px 0;
            border: none;
            border-radius: 12px;
            background: #333;
            color: #fff;
            transition: background 0.15s;
        }
        .mode-grid button.active-mode {
            background: var(--btn);
            color: #fff;
        }
        .light-mode .mode-grid button {
            background: #ddd;
            color: #222;
        }
        .light-mode .mode-grid button.active-mode {
            background: var(--btn);
            color: #fff;
        }

        /* ── Cruz direccional ── */
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 10px;
            width: 70vmin;
            height: 70vmin;
            max-width: 280px;
            max-height: 280px;
        }
        .dpad button {
            font-size: clamp(30px, 8vw, 44px);
            border: none;
            border-radius: 12px;
            background: var(--btn);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, transform 0.1s;
        }
        .dpad button:active {
            background: var(--btn-hover);
            transform: scale(0.92);
        }
        .dpad .empty {
            background: transparent;
            pointer-events: none;
        }

        /* ── Botones de función ── */
        .function-btns {
            display: flex;
            width: 100%;
            max-width: 400px;
            gap: 10px;
            padding: 0 5px;
        }
        .function-btns button {
            flex: 1;
            font-size: clamp(14px, 3.5vw, 20px);
            font-weight: 700;
            padding: 15px 0;
            border: none;
            border-radius: 12px;
            background: var(--dim);
            color: #fff;
            transition: background 0.15s;
        }
        .function-btns button.special {
            background: var(--special);
        }
        .light-mode .function-btns button {
            background: #ddd;
            color: #222;
        }
        .light-mode .function-btns button.special {
            background: var(--special);
            color: #fff;
        }

        /* ── Toggle tema ── */
        #theme-toggle {
            font-size: 14px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #555;
            color: #fff;
            transition: background 0.2s;
        }
        .light-mode #theme-toggle {
            background: #aaa;
            color: #000;
        }
        button:active { filter: brightness(0.9); }
    </style>
</head>
<body>
    <!-- Modo -->
    <div class="mode-grid" id="mode-buttons">
        <button data-mode="letters" class="active-mode">Letras</button>
        <button data-mode="numbers">Números</button>
        <button data-mode="pediatric">Figuras</button>
        <button data-mode="e_directional">E direc.</button>
    </div>

    <!-- Cruz direccional -->
    <div class="dpad">
        <div class="empty"></div>
        <button onclick="enviar('ArrowUp')">▲</button>
        <div class="empty"></div>
        <button onclick="enviar('ArrowLeft')">◀</button>
        <div class="empty"></div>
        <button onclick="enviar('ArrowRight')">▶</button>
        <div class="empty"></div>
        <button onclick="enviar('ArrowDown')">▼</button>
        <div class="empty"></div>
    </div>

    <!-- Funciones -->
    <div class="function-btns">
        <button onclick="enviar('KeyR')">🔦<br>Resaltar</button>
        <button onclick="enviar('KeyU')">👤<br>Individual</button>
        <button onclick="enviar('KeyB')" class="special">🎨<br>Bicrom.</button>
    </div>

    <!-- Tema -->
    <button id="theme-toggle" onclick="toggleTheme()">🌓 Modo claro</button>

    <script>
        const socket = io();

        function enviar(cmd) {
            socket.emit('comando', cmd);
            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate(15);
            }
        }

        // Configurar botones de modo con data-mode
        document.querySelectorAll('#mode-buttons button').forEach(btn => {
            btn.addEventListener('click', () => {
                enviar('Mode:' + btn.dataset.mode);
            });
        });

        // Actualizar botón activo cuando el servidor notifica el modo
        socket.on('modo', (modo) => {
            document.querySelectorAll('#mode-buttons button').forEach(btn => {
                btn.classList.toggle('active-mode', btn.dataset.mode === modo);
            });
        });

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const btn = document.getElementById('theme-toggle');
            btn.textContent = document.body.classList.contains('light-mode')
                ? '🌓 Modo oscuro'
                : '🌓 Modo claro';
        }
    </script>
</body>
</html>
