<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Control Remoto Boomerang</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* ═══════════ FUENTE OPTICIAN SANS (título) ═══════════ */
        @font-face {
            font-family: 'OpticianSans';
            src: url('/OpticianSans.woff') format('woff');
            font-weight: normal;
            font-style: normal;
            font-display: block;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
            background: #111;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Título BOOMERANG VISION */
        .remote-title {
            font-family: 'OpticianSans', 'Arial Black', Impact, sans-serif;
            font-size: 5vw;           /* responsivo */
            font-weight: normal;
            color: #ccc;
            letter-spacing: 0.5vw;
            text-align: center;
            margin-bottom: 2vh;
        }

        /* Contenedor principal */
        #remote-screen {
            width: 94%;
            max-width: 500px;
            flex: 0 0 auto;
            min-height: 28vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            border-radius: 3vw;
            margin-bottom: 2vh;
            padding: 2vw;
            overflow: hidden;
        }
        #remote-screen img { filter: invert(1); }

        .remote-line {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            gap: 3vw;
        }
        .remote-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3vw;
        }
        .remote-row img {
            display: block;
            flex-shrink: 0;
        }
        .remote-text {
            font-family: 'Arial Black', Impact, sans-serif;
            font-weight: normal;
            color: #fff;
            line-height: 1;
            display: block;
            font-size: 8vw;          /* antes 36px -> ahora responsivo */
        }
        .remote-line.dimmed .remote-text,
        .remote-line.dimmed img { opacity: 0.10; }

        .remote-ann-left, .remote-ann-right {
            font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
            font-weight: 600;
            width: 14vw;
            text-align: center;
            font-size: 3.5vw;
            color: #aaa;
            flex-shrink: 0;
        }

        /* Botones de modo */
        .mode-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2vw;
            width: 94%;
            max-width: 400px;
            margin-bottom: 2vh;
        }
        .mode-grid button {
            font-size: 3.5vw;
            font-weight: 700;
            padding: 2.5vw 0;
            border: none;
            border-radius: 2vw;
            background: #333;
            color: #fff;
        }
        .mode-grid button.active-mode { background: #2980b9; }

        /* Cruz direccional */
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 2vw;
            width: 70vw;
            height: 70vw;
            max-width: 300px;
            max-height: 300px;
            margin-bottom: 2vh;
        }
        .dpad button {
            font-size: 8vw;
            border: none;
            border-radius: 2vw;
            background: #2980b9;
            color: #fff;
        }
        .dpad button:active { background: #3498db; transform: scale(0.92); }
        .dpad .empty { background: transparent; pointer-events: none; }

        /* Botones de función (inferiores) */
        .function-btns {
            display: flex;
            width: 94%;
            max-width: 400px;
            gap: 2vw;
        }
        .function-btns button {
            flex: 1;
            font-size: 3.5vw;
            font-weight: 700;
            padding: 3vw 0;
            border: 2px solid transparent;
            border-radius: 2vw;
            background: #444;
            color: #fff;
        }
        .function-btns button.active-func { border-color: #f1c40f; }
        .function-btns button.special {
            background: linear-gradient(to right, #e74c3c 50%, #2ecc71 50%);
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="remote-title">BOOMERANG VISION</div>

    <div id="remote-screen"></div>

    <div class="mode-grid" id="mode-buttons">
        <button data-mode="letters" class="active-mode">Letras</button>
        <button data-mode="numbers">Números</button>
        <button data-mode="pediatric">Figuras</button>
        <button data-mode="e_directional">E direc.</button>
    </div>

    <div class="dpad">
        <div class="empty"></div><button onclick="enviar('ArrowUp')">▲</button><div class="empty"></div>
        <button onclick="enviar('ArrowLeft')">◀</button><div class="empty"></div><button onclick="enviar('ArrowRight')">▶</button>
        <div class="empty"></div><button onclick="enviar('ArrowDown')">▼</button><div class="empty"></div>
    </div>

    <div class="function-btns" id="func-buttons">
        <button id="btn-resaltar" onclick="enviar('KeyR')">🔦 Resaltar</button>
        <button id="btn-individual" onclick="enviar('KeyU')">👤 Individual</button>
        <button id="btn-bic" class="special" onclick="enviar('KeyB')"></button>
    </div>

    <script>
        const socket = io();
        function enviar(cmd) {
            socket.emit('comando', cmd);
            if (window.navigator?.vibrate) window.navigator.vibrate(15);
        }

        document.querySelectorAll('#mode-buttons button').forEach(btn => {
            btn.addEventListener('click', () => enviar('Mode:' + btn.dataset.mode));
        });

        socket.on('modo', (modo) => {
            document.querySelectorAll('#mode-buttons button').forEach(btn => {
                btn.classList.toggle('active-mode', btn.dataset.mode === modo);
            });
        });

        function updateFuncButtons(state) {
            document.getElementById('btn-resaltar')?.classList.toggle('active-func', state.highlightMode);
            document.getElementById('btn-individual')?.classList.toggle('active-func', state.singleCharMode);
            document.getElementById('btn-bic')?.classList.toggle('active-func', state.bichromatic);
        }

        const BASE_FONT_SIZE_VW = 8;   // tamaño base en vw (relativo al ancho de pantalla)
        const SCALE_E = 0.739;
        const SCALE_FIG = 0.769;

        socket.on('screenUpdate', (data) => {
            const container = document.getElementById('remote-screen');
            container.innerHTML = '';
            if (!data?.lines) return;

            const gap = 3;   // en vw
            container.style.gap = gap + 'vw';

            data.lines.forEach((line, li) => {
                const lineDiv = document.createElement('div');
                lineDiv.className = 'remote-line';
                lineDiv.style.gap = gap + 'vw';

                if (data.highlightMode && li !== data.highlightLineIdx) {
                    lineDiv.classList.add('dimmed');
                }

                const leftAnn = document.createElement('div');
                leftAnn.className = 'remote-ann-left';
                let denominator = line.snellen;
                if (denominator && denominator.includes('/')) {
                    denominator = denominator.split('/')[1];
                }
                leftAnn.textContent = denominator;

                const row = document.createElement('div');
                row.className = 'remote-row';
                row.style.gap = gap + 'vw';

                let chars = line.chars;
                if (data.singleCharMode) chars = [chars[0]];

                chars.forEach(ch => {
                    if (ch.type === 'text') {
                        const span = document.createElement('span');
                        span.className = 'remote-text';
                        span.textContent = ch.char;
                        span.style.fontSize = BASE_FONT_SIZE_VW + 'vw';
                        row.appendChild(span);
                    } else {
                        const img = document.createElement('img');
                        let scale = ch.key === 'E_0' ? SCALE_E : SCALE_FIG;
                        const size = BASE_FONT_SIZE_VW * scale;
                        img.style.height = size + 'vw';
                        img.style.width = size + 'vw';
                        img.style.display = 'block';
                        if (ch.rot) img.style.transform = `rotate(${ch.rot}deg)`;
                        img.src = ch.uri || '';
                        row.appendChild(img);
                    }
                });

                const rightAnn = document.createElement('div');
                rightAnn.className = 'remote-ann-right';
                rightAnn.textContent = line.decimal.toFixed(2);

                lineDiv.appendChild(leftAnn);
                lineDiv.appendChild(row);
                lineDiv.appendChild(rightAnn);
                container.appendChild(lineDiv);
            });

            updateFuncButtons(data);
        });

        socket.on('connect', () => socket.emit('requestScreenUpdate'));
    </script>
</body>
</html>
