<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Control Remoto Boomerang</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #111;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px;
            user-select: none;
            -webkit-user-select: none;
            overflow: hidden;
        }

        /* Contenedor principal: sin scroll, altura fija */
        #remote-screen {
            width: 100%;
            max-width: 500px;
            height: auto;
            max-height: 65vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: #000;
            border-radius: 12px;
            margin-bottom: 12px;
            padding: 8px 4px;
            overflow: hidden;
        }
        #remote-screen img { filter: invert(1); }

        .remote-line {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            gap: 4px;
        }
        .remote-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        .remote-row img {
            display: block;
            flex-shrink: 0;
        }
        .remote-text {
            font-family: 'Arial Black', Impact, sans-serif;
            font-weight: normal;
            color: #fff;
            line-height: 1;
            display: block;
        }
        .remote-line.dimmed .remote-text,
        .remote-line.dimmed img { opacity: 0.10; }

        .remote-ann-left, .remote-ann-right {
            font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
            font-weight: 600;
            width: 45px;
            text-align: center;
            font-size: 12px;
            color: #aaa;
            flex-shrink: 0;
        }

        /* Botones (igual que antes) */
        .mode-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            width: 100%;
            max-width: 400px;
            margin-bottom: 8px;
        }
        .mode-grid button {
            font-size: 13px;
            font-weight: 700;
            padding: 8px 0;
            border: none;
            border-radius: 8px;
            background: #333;
            color: #fff;
        }
        .mode-grid button.active-mode { background: #2980b9; }

        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 5px;
            width: 60vmin;
            height: 60vmin;
            max-width: 220px;
            max-height: 220px;
            margin-bottom: 8px;
        }
        .dpad button {
            font-size: 28px;
            border: none;
            border-radius: 8px;
            background: #2980b9;
            color: #fff;
        }
        .dpad button:active { background: #3498db; transform: scale(0.92); }
        .dpad .empty { background: transparent; pointer-events: none; }

        .function-btns {
            display: flex;
            width: 100%;
            max-width: 400px;
            gap: 5px;
        }
        .function-btns button {
            flex: 1;
            font-size: 12px;
            font-weight: 700;
            padding: 10px 0;
            border: 2px solid transparent;
            border-radius: 8px;
            background: #444;
            color: #fff;
        }
        .function-btns button.active-func { border-color: #f1c40f; }
        .function-btns button.special {
            background: linear-gradient(to right, #e74c3c 50%, #2ecc71 50%);
            color: #fff;
        }
    </style>
</head>
<body>
    <div id="remote-screen"></div>

    <div class="mode-grid" id="mode-buttons">
        <button data-mode="letters" class="active-mode">Letras</button>
        <button data-mode="numbers">Números</button>
        <button data-mode="pediatric">Figuras</button>
        <button data-mode="e_directional">E direc.</button>
    </div>

    <div class="dpad">
        <div class="empty"></div><button onclick="enviar('ArrowUp')">▲</button><div class="empty"></div>
        <button onclick="enviar('ArrowLeft')">◀</button><div class="empty"></div><button onclick="enviar('ArrowRight')">▶</button>
        <div class="empty"></div><button onclick="enviar('ArrowDown')">▼</button><div class="empty"></div>
    </div>

    <div class="function-btns" id="func-buttons">
        <button id="btn-resaltar" onclick="enviar('KeyR')">🔦 Resaltar</button>
        <button id="btn-individual" onclick="enviar('KeyU')">👤 Individual</button>
        <button id="btn-bic" class="special" onclick="enviar('KeyB')"></button>
    </div>

    <script>
        const socket = io();
        function enviar(cmd) {
            socket.emit('comando', cmd);
            if (window.navigator?.vibrate) window.navigator.vibrate(15);
        }

        document.querySelectorAll('#mode-buttons button').forEach(btn => {
            btn.addEventListener('click', () => enviar('Mode:' + btn.dataset.mode));
        });

        socket.on('modo', (modo) => {
            document.querySelectorAll('#mode-buttons button').forEach(btn => {
                btn.classList.toggle('active-mode', btn.dataset.mode === modo);
            });
        });

        function updateFuncButtons(state) {
            document.getElementById('btn-resaltar')?.classList.toggle('active-func', state.highlightMode);
            document.getElementById('btn-individual')?.classList.toggle('active-func', state.singleCharMode);
            document.getElementById('btn-bic')?.classList.toggle('active-func', state.bichromatic);
        }

        // Normalización: tamaño máximo para la línea más grande (20/400)
        function getNormalizedSize(originalCssSize) {
            const maxSize = 32; // px máximo para texto/imágenes
            return Math.min(originalCssSize, maxSize);
        }

        socket.on('screenUpdate', (data) => {
            const container = document.getElementById('remote-screen');
            container.innerHTML = '';
            if (!data?.lines || !data.cal) return;

            const cal = data.cal;
            const rad = (min) => min * Math.PI / 10800;
            function optotypeHeightMM(decimal, distanceM) {
                const angleMin = 5 / decimal;
                return 2 * distanceM * 1000 * Math.tan(rad(angleMin / 2));
            }
            function cssHeight(h_mm) {
                return (h_mm * cal.pxPerMM) / cal.dprManual * cal.calibrationScale;
            }

            // Calcular tamaño original de la primera línea y aplicar límite
            const firstDecimal = data.lines[0]?.decimal || 1.0;
            const firstH_mm = optotypeHeightMM(firstDecimal, cal.testDistanceM);
            let baseSize = cssHeight(firstH_mm);
            baseSize = Math.min(baseSize, 32); // límite global

            // Espaciado proporcional al tamaño base (máximo 8px)
            let gap = Math.min(6, baseSize * 0.25);
            container.style.gap = gap + 'px';

            data.lines.forEach((line, li) => {
                const lineDiv = document.createElement('div');
                lineDiv.className = 'remote-line';
                lineDiv.style.gap = gap + 'px';

                if (data.highlightMode && li !== data.highlightLineIdx) {
                    lineDiv.classList.add('dimmed');
                }

                const leftAnn = document.createElement('div');
                leftAnn.className = 'remote-ann-left';
                leftAnn.textContent = line.snellen.split('/')[1];

                const row = document.createElement('div');
                row.className = 'remote-row';
                row.style.gap = gap + 'px';

                let chars = line.chars;
                if (data.singleCharMode) chars = [chars[0]];

                // Calculamos el tamaño proporcional para esta línea
                const h_mm = optotypeHeightMM(line.decimal, cal.testDistanceM);
                let rawSize = cssHeight(h_mm);
                // Escala de referencia: la línea más grande (20/400) tendrá baseSize (≤32px)
                // Las demás se escalan proporcionalmente a su tamaño original relativo
                const firstRaw = cssHeight(optotypeHeightMM(firstDecimal, cal.testDistanceM));
                const proportionalSize = (rawSize / firstRaw) * baseSize;
                const finalSize = Math.min(proportionalSize, 32);

                chars.forEach(ch => {
                    if (ch.type === 'text') {
                        const span = document.createElement('span');
                        span.className = 'remote-text';
                        span.textContent = ch.char;
                        span.style.fontSize = finalSize + 'px';
                        row.appendChild(span);
                    } else {
                        const img = document.createElement('img');
                        const scaleE = 0.739, scaleFig = 0.769;
                        const scale = ch.key === 'E_0' ? scaleE : scaleFig;
                        const size = finalSize * scale;
                        img.style.height = size + 'px';
                        img.style.width = size + 'px';
                        img.style.display = 'block';
                        if (ch.rot) img.style.transform = `rotate(${ch.rot}deg)`;
                        img.src = ch.uri || '';
                        row.appendChild(img);
                    }
                });

                const rightAnn = document.createElement('div');
                rightAnn.className = 'remote-ann-right';
                rightAnn.textContent = line.decimal.toFixed(2);

                lineDiv.appendChild(leftAnn);
                lineDiv.appendChild(row);
                lineDiv.appendChild(rightAnn);
                container.appendChild(lineDiv);
            });

            updateFuncButtons(data);
        });

        socket.on('connect', () => socket.emit('requestScreenUpdate'));
    </script>
</body>
</html>
