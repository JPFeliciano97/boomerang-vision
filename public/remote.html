<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Control Remoto Boomerang</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg: #111;
            --text: #fff;
            --btn: #2980b9;
            --btn-active: #3498db;
            --special: #8e44ad;
            --dim: #444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #111;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px;
            user-select: none;
            -webkit-user-select: none;
        }

        /* === Zona de optotipos (espejo del index) === */
        #remote-screen {
            width: 100%;
            max-height: 30vh;          /* 👈 más pequeño, no ocupa media pantalla */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            background: #000;
            border-radius: 10px;
            margin-bottom: 8px;
            padding: 6px;
            overflow: hidden;
        }
        .remote-line {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            gap: 4px;
        }
        .remote-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        .remote-row img {
            display: block;
            flex-shrink: 0;
            transform-origin: center center;
        }
        .remote-text {
            font-family: 'Arial Black', Impact, sans-serif;
            font-weight: normal;
            color: #fff;
            line-height: 1;
            display: block;
            max-font-size: 40px;       /* 👈 limitamos tamaño máximo */
        }
        .remote-ann-left, .remote-ann-right {
            font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
            font-weight: 600;
            width: 60px;
            text-align: center;
            font-size: 14px;
            color: #aaa;
        }

        /* === Botones de modo === */
        .mode-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            width: 100%;
            max-width: 400px;
            margin-bottom: 6px;
        }
        .mode-grid button {
            font-size: 14px;
            font-weight: 700;
            padding: 12px 0;
            border: none;
            border-radius: 10px;
            background: #333;
            color: #fff;
        }
        .mode-grid button.active-mode {
            background: #2980b9;
        }

        /* === Cruz direccional === */
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 6px;
            width: 60vmin;
            height: 60vmin;
            max-width: 240px;
            max-height: 240px;
            margin-bottom: 6px;
        }
        .dpad button {
            font-size: 28px;
            border: none;
            border-radius: 10px;
            background: #2980b9;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .dpad button:active {
            background: #3498db;
            transform: scale(0.92);
        }
        .dpad .empty {
            background: transparent;
            pointer-events: none;
        }

        /* === Botones de función con estado activo === */
        .function-btns {
            display: flex;
            width: 100%;
            max-width: 400px;
            gap: 6px;
        }
        .function-btns button {
            flex: 1;
            font-size: 14px;
            font-weight: 700;
            padding: 12px 0;
            border: 3px solid transparent;
            border-radius: 10px;
            background: #444;
            color: #fff;
            transition: border-color 0.2s;
        }
        .function-btns button.active-func {
            border-color: #f1c40f;      /* 👈 borde amarillo cuando está activo */
        }
        .function-btns button.special {
            background: linear-gradient(to right, #e74c3c 50%, #2ecc71 50%);
            color: #fff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <!-- Espejo de la pantalla principal -->
    <div id="remote-screen"></div>

    <!-- Modo -->
    <div class="mode-grid" id="mode-buttons">
        <button data-mode="letters" class="active-mode">Letras</button>
        <button data-mode="numbers">Números</button>
        <button data-mode="pediatric">Figuras</button>
        <button data-mode="e_directional">E direc.</button>
    </div>

    <!-- Cruz direccional -->
    <div class="dpad">
        <div class="empty"></div>
        <button onclick="enviar('ArrowUp')">▲</button>
        <div class="empty"></div>
        <button onclick="enviar('ArrowLeft')">◀</button>
        <div class="empty"></div>
        <button onclick="enviar('ArrowRight')">▶</button>
        <div class="empty"></div>
        <button onclick="enviar('ArrowDown')">▼</button>
        <div class="empty"></div>
    </div>

    <!-- Funciones -->
    <div class="function-btns" id="func-buttons">
        <button id="btn-resaltar" onclick="enviar('KeyR')">🔦 Resaltar</button>
        <button id="btn-individual" onclick="enviar('KeyU')">👤 Individual</button>
        <button id="btn-bic" class="special" onclick="enviar('KeyB')"></button>
    </div>

    <script>
        const socket = io();

        function enviar(cmd) {
            socket.emit('comando', cmd);
            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate(15);
            }
        }

        // Botones de modo
        document.querySelectorAll('#mode-buttons button').forEach(btn => {
            btn.addEventListener('click', () => {
                enviar('Mode:' + btn.dataset.mode);
            });
        });

        // Modo activo
        socket.on('modo', (modo) => {
            document.querySelectorAll('#mode-buttons button').forEach(btn => {
                btn.classList.toggle('active-mode', btn.dataset.mode === modo);
            });
        });

        // Actualizar botones de función
        function updateFuncButtons(state) {
            const resaltar = document.getElementById('btn-resaltar');
            const individual = document.getElementById('btn-individual');
            const bic = document.getElementById('btn-bic');
            if (resaltar) resaltar.classList.toggle('active-func', state.highlightMode);
            if (individual) individual.classList.toggle('active-func', state.singleCharMode);
            if (bic) bic.classList.toggle('active-func', state.bichromatic);
        }

        // Dibujar pantalla espejo
        socket.on('screenUpdate', (data) => {
            const container = document.getElementById('remote-screen');
            container.innerHTML = '';
            if (!data || !data.lines || !data.cal) return;

            const cal = data.cal;
            const pxPerMM = cal.pxPerMM;
            function cssHeight(h_mm) {
                return (h_mm * pxPerMM) / cal.dprManual * cal.calibrationScale;
            }
            const rad = (min) => min * Math.PI / 10800;
            function optotypeHeightMM(decimal) {
                const angleMin = 5 / decimal;
                return 2 * cal.testDistanceM * 1000 * Math.tan(rad(angleMin / 2));
            }

            const firstDecimal = data.lines[0]?.decimal || 1.0;
            const baseH_mm = optotypeHeightMM(firstDecimal);
            let baseSpacing = cssHeight(baseH_mm) * 0.5;
            if (data.lines.length > 1) baseSpacing *= 1.15;
            const responsiveGap = `clamp(3px, 1vw, ${baseSpacing}px)`;
            container.style.gap = responsiveGap;

            data.lines.forEach(line => {
                const h_mm = optotypeHeightMM(line.decimal);
                const h_css = cssHeight(h_mm);

                const lineDiv = document.createElement('div');
                lineDiv.className = 'remote-line';
                lineDiv.style.gap = responsiveGap;

                const leftAnn = document.createElement('div');
                leftAnn.className = 'remote-ann-left';
                leftAnn.textContent = line.snellen;

                const row = document.createElement('div');
                row.className = 'remote-row';
                row.style.gap = responsiveGap;

                (line.chars || []).forEach(ch => {
                    if (ch.type === 'text') {
                        const span = document.createElement('span');
                        span.className = 'remote-text';
                        span.textContent = ch.char;
                        span.style.fontSize = Math.min(h_css, 40) + 'px'; // 👈 límite máximo
                        row.appendChild(span);
                    } else {
                        const img = document.createElement('img');
                        const scaleE = 0.739;
                        const scaleFig = 0.769;
                        const scale = ch.key === 'E_0' ? scaleE : scaleFig;
                        const size = h_css * scale;
                        img.style.height = Math.min(size, 40) + 'px';  // 👈 límite máximo
                        img.style.width  = img.style.height;
                        img.style.display = 'block';
                        img.style.transformOrigin = 'center center';
                        if (ch.rot) img.style.transform = `rotate(${ch.rot}deg)`;
                        img.src = ch.uri || '';
                        row.appendChild(img);
                    }
                });

                const rightAnn = document.createElement('div');
                rightAnn.className = 'remote-ann-right';
                rightAnn.textContent = line.decimal.toFixed(2);

                lineDiv.appendChild(leftAnn);
                lineDiv.appendChild(row);
                lineDiv.appendChild(rightAnn);
                container.appendChild(lineDiv);
            });

            // Actualizar estado de los botones de función
            updateFuncButtons(data);
        });

        // Al conectar, pedir el estado actual al servidor (que reenviará al index)
        socket.on('connect', () => {
            socket.emit('requestScreenUpdate');
        });
    </script>
</body>
</html>
